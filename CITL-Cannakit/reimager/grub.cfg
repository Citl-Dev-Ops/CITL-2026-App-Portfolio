################################################################################
# CITL Reimager USB — GRUB 2 Configuration
# Label-based search so UUID changes (new partitions, reformat) never break boot
################################################################################

set default=0
set timeout=10
set gfxpayload=keep
insmod all_video
insmod gfxterm
terminal_output gfxterm

# Search by FS label — works regardless of UUIDs or partition numbering
search --no-floppy --label --set=root CITLBOOT

if [ -f /boot/grub/theme/theme.txt ]; then
    set theme=/boot/grub/theme/theme.txt
fi

menuentry "CITL Reimager — Ubuntu 24.04 (Guided Install)" {
    search --no-floppy --label --set=root CITLBOOT
    linux  /casper/vmlinuz boot=casper quiet splash \
           citl.autorun=/opt/citl/citl_reimager.sh ---
    initrd /casper/initrd
}

menuentry "CITL Reimager — CLI Only (No GUI)" {
    search --no-floppy --label --set=root CITLBOOT
    linux  /casper/vmlinuz boot=casper text quiet \
           citl.autorun=/opt/citl/citl_reimager.sh ---
    initrd /casper/initrd
}

menuentry "CITL Reimager — Safe Mode (nomodeset)" {
    search --no-floppy --label --set=root CITLBOOT
    linux  /casper/vmlinuz boot=casper nomodeset quiet splash \
           citl.autorun=/opt/citl/citl_reimager.sh ---
    initrd /casper/initrd
}

menuentry "Live Ubuntu 24.04 Desktop (no reimager)" {
    search --no-floppy --label --set=root CITLBOOT
    linux  /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}

menuentry "Memory Test (memtest86+)" {
    search --no-floppy --label --set=root CITLBOOT
    linux16 /boot/memtest86+x64.efi
}
