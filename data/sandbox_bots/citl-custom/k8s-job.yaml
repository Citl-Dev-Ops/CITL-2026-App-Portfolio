apiVersion: batch/v1
kind: Job
metadata:
  name: citl-custom-demo
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: bot-demo
        image: citl/citl-custom-demo:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: OLLAMA_HOST
          value: "http://ollama.ollama.svc.cluster.local:11434"
        - name: OLLAMA_MODEL
          value: "citl-custom"
